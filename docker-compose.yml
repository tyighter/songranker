services:
  songranker:
    container_name: Songranker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2112:2112"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 2112
      DATABASE_URL: sqlite+pysqlite:////data/songranker.db
    volumes:
      - songranker_data:/data

volumes:
  songranker_data:
