services:
  songranker:
    container_name: Songranker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2112:2112"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 2112
      APP_ENV: local
      DATABASE_URL: sqlite+pysqlite:////data/songranker.db
      YOUTUBE_DATA_API_KEY: ${YOUTUBE_DATA_API_KEY:-}
      YOUTUBE_SEARCH_FALLBACK_PROVIDER: disabled
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    volumes:
      - songranker_data:/data

volumes:
  songranker_data:
