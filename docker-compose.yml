services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2112:2112"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 2112
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: songranker
      DB_USER: songranker
      DB_PASSWORD: songranker
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: songranker
      POSTGRES_USER: songranker
      POSTGRES_PASSWORD: songranker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U songranker -d songranker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
