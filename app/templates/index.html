<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SongRanker</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main>
    <h1>SongRanker</h1>
    <p>App bound to {{ app_host }}:{{ app_port }}</p>
    <p class="warning">{{ notice }}</p>

    <section class="panel">
      <h2>Session</h2>
      <p>Signed in as <strong>{{ current_user.username }}</strong>.</p>
      <div class="inline-forms">
        <form method="post" action="/api/auth/signout">
          <button type="submit">Sign out</button>
        </form>
      </div>
      <h3>Switch user</h3>
      <form method="post" action="/api/auth/switch-user">
        <label>User
          <select name="user_id" required>
            {% for user in users %}
            <option value="{{ user.id }}" {% if user.id == current_user.id %}selected{% endif %}>{{ user.username }}</option>
            {% endfor %}
          </select>
        </label>
        <label>Password <input type="password" name="password" required /></label>
        <button type="submit">Switch user</button>
      </form>
    </section>

    <section class="panel">
      <h2>Comparison Controls</h2>
      <label>Artist filter <input type="text" id="artist-filter" placeholder="optional exact artist" /></label>
      <label>Title contains <input type="text" id="title-filter" placeholder="optional text" /></label>
      <button id="next-pair-btn">Get next pair</button>
      <button id="resync-btn" type="button">Manual Plex resync</button>
      <p id="status"></p>
    </section>

    <section class="panel" id="pair-panel" hidden>
      <h2>Current Pair</h2>
      <div id="pair-content"></div>
      <div class="actions">
        <button id="vote-left">Vote left song</button>
        <button id="vote-right">Vote right song</button>
      </div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const pairPanel = document.getElementById("pair-panel");
    const pairContent = document.getElementById("pair-content");
    const artistFilterEl = document.getElementById("artist-filter");
    const titleFilterEl = document.getElementById("title-filter");

    let currentPair = null;
    let currentFilters = {};

    function collectFilters() {
      const filters = {};
      if (artistFilterEl.value.trim()) {
        filters.artist = artistFilterEl.value.trim();
      }
      if (titleFilterEl.value.trim()) {
        filters.title_query = titleFilterEl.value.trim();
      }
      return filters;
    }

    function queryFromFilters(filters) {
      const params = new URLSearchParams({});
      if (filters.artist) params.set("artist", filters.artist);
      if (filters.title_query) params.set("title_query", filters.title_query);
      return params.toString();
    }

    async function loadNextPair() {
      currentFilters = collectFilters();
      const query = queryFromFilters(currentFilters);

      statusEl.textContent = "Loading next pair...";
      pairPanel.hidden = true;

      const response = await fetch(`/api/rate/next?${query}`);
      if (!response.ok) {
        const body = await response.json().catch(() => ({}));
        statusEl.textContent = body.detail || "No pair available.";
        return;
      }

      const payload = await response.json();
      currentPair = payload.pair;
      pairContent.innerHTML = `
        <div class="song-card">
          <h3>${currentPair[0].title}</h3>
          <p>${currentPair[0].artist}</p>
          <small>Score: ${currentPair[0].score}</small>
        </div>
        <div class="song-card">
          <h3>${currentPair[1].title}</h3>
          <p>${currentPair[1].artist}</p>
          <small>Score: ${currentPair[1].score}</small>
        </div>
      `;
      pairPanel.hidden = false;
      statusEl.textContent = "Vote to update ranking.";
    }

    async function submitVote(winnerIndex) {
      if (!currentPair) return;

      const winner = currentPair[winnerIndex];
      const loser = currentPair[winnerIndex === 0 ? 1 : 0];

      const response = await fetch("/api/rate/vote", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          winner_song_id: winner.song_id,
          loser_song_id: loser.song_id,
          filters: currentFilters,
        }),
      });

      if (!response.ok) {
        const body = await response.json().catch(() => ({}));
        statusEl.textContent = body.detail || "Vote failed.";
        return;
      }

      const payload = await response.json();
      statusEl.textContent = `Vote saved. ${payload.winner.title} is now ${payload.winner.score}.`;
      await loadNextPair();
    }

    document.getElementById("next-pair-btn").addEventListener("click", loadNextPair);
    document.getElementById("vote-left").addEventListener("click", () => submitVote(0));
    document.getElementById("vote-right").addEventListener("click", () => submitVote(1));

    document.getElementById("resync-btn").addEventListener("click", async () => {
      statusEl.textContent = "Running Plex resync...";
      const response = await fetch("/api/plex/resync", { method: "POST" });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        statusEl.textContent = body.detail || "Resync failed.";
        return;
      }
      statusEl.textContent = `Resync complete. Imported ${body.imported}, updated ${body.updated}.`;
    });
  </script>
</body>
</html>
