<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SongRanker</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main>
    <h1>SongRanker</h1>
    <p>App bound to {{ app_host }}:{{ app_port }}</p>
    <p>Health endpoint: <a href="/health">/health</a></p>
    <p>Cached songs available for ranking: <strong>{{ song_count }}</strong></p>
    <form method="post" action="/resync">
      <button type="submit">Manual Plex metadata resync</button>
    </form>
  </main>
</body>
</html>
